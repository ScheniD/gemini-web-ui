<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <!-- Drag & Drop Overlay -->
    <div id="drag-overlay" class="drag-overlay" style="display: none;">
        <div class="drag-content">
            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <h2>Drop text files to attach</h2>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <button id="new-chat-btn" class="new-chat-btn">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
            <div class="sessions-header">Recent Sessions</div>
            <div class="sessions-list" id="sessions-list">
                <!-- Session items will be injected here -->
            </div>
        </aside>

        <div class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="icon-btn" title="Toggle Sidebar">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="model-info">
                        <span class="model-name" id="current-model-display">Gemini</span>
                    </div>
                </div>
                <div class="header-right" style="display: flex; gap: 12px; align-items: center;">
                    <button id="settings-btn" class="icon-btn" title="Settings">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                    <div class="session-info">
                    <span id="session-badge">Session: <span id="session-id-display">Generating...</span></span>
                </div>
            </header>

            <main class="chat-container" id="chat-container">
                <div class="welcome-message" id="welcome-message">
                    <div class="logo-icon-large"></div>
                    <h2>How can I help you today?</h2>
                </div>
                <div class="chat-history" id="chat-history">
                    <!-- Messages will be injected here -->
                </div>
                <button id="scroll-bottom-btn" class="scroll-bottom-btn" style="display: none;" title="Scroll to bottom">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <polyline points="19 12 12 19 5 12"></polyline>
                    </svg>
                </button>
            </main>

            <footer class="input-area">
                <div class="input-wrapper">
                    <div class="stop-btn-container" id="stop-btn-container" style="display: none;">
                        <button id="stop-btn" class="stop-btn">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="currentColor" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="6" y="6" width="12" height="12"></rect>
                            </svg>
                            Stop Generating
                        </button>
                    </div>
                    <form id="chat-form">
                        <div style="display: flex; flex-direction: column; width: 100%; gap: 8px;">
                            <div id="attachments-container" class="attachments-container" style="display: none;"></div>
                            <div style="display: flex; gap: 12px; align-items: flex-end;">
                                <textarea id="prompt-input" placeholder="Message Gemini... (Drag & Drop files)" rows="1" autofocus></textarea>
                                <button type="submit" id="send-btn" disabled>
                                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="disclaimer">Gemini can make mistakes. Consider verifying important information.</div>
            </footer>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-btn" id="close-settings-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="model-select">Model Version</label>
                    <select id="model-select">
                        <option value="auto-gemini-3">Auto Gemini 3</option>
                        <option value="gemini-3-flash-preview">Gemini 3 Flash Preview</option>
                        <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" id="save-settings-btn">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
